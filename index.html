<!DOCTYPE html>
<html>
<body>
<head>
<link rel="stylesheet" href="style.css">
</head>
<h2>Search Mining Pool</h2>
<p>Sometimes the api will not work on rishihood wifi, so please try on mobile data, also to see all the blocks, just press search without anything in the input box</p>

<input type="text" id="search" placeholder="Enter pool name">
<button onclick="search()">Search</button>

<table border="1" width="100%" id="table">
    <thead>
        <tr>
            <th>Height</th>
            <th>Pool</th>
            <th>Timestamp</th>
            <th>Tx Count</th>
            <th>Reward</th>
            <th>Fees</th>
        </tr>
    </thead>
    <tbody id="result"></tbody>
</table>

<script src="./api/mempool.js"></script>

</body>
</html>
